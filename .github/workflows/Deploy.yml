name: package

on:
    workflow_dispatch:
    #   We build semver tags, and the master branch.
    push:
        branches: [ master ]
        tags:
            -   '[0-9]+.[0-9]+.[0-9]+'

jobs:
    macos:
        runs-on: macos-26
        name: macOS
        steps:
            -   name: 🎀 Setup AWS CLI 🎀
                uses: aws-actions/configure-aws-credentials@v1
                with:
                    aws-secret-access-key: ${{ secrets.AWS_S3_ACCESS_SECRET }}
                    aws-access-key-id: ${{ vars.AWS_S3_ACCESS_KEY }}
                    aws-region: us-east-1

            -   name: 🎀 Checkout repository 🎀
                uses: actions/checkout@v3

            -   name: 🎀 Select Xcode 26.3 🎀
                run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

            -   name: 🎀 Build Dollup 🎀
                run: Scripts/Build/macOS
                env:
                    DEPLOY_VERSION: ${{ github.head_ref || github.ref_name }}

            -   name: 🎀 Upload products 🎀
                run: Scripts/Deploy *.artifactbundle.zip
                env:
                    DEPLOY_PLATFORM: "${{ runner.os }}-${{ runner.arch }}"
                    DEPLOY_VERSION: ${{ github.head_ref || github.ref_name }}

    linux:
        strategy:
            matrix:
                os:
                    -   codename: jammy
                        version: Ubuntu-22.04
                        display: Ubuntu 22.04

                    -   codename: noble
                        version: Ubuntu-24.04
                        display: Ubuntu 24.04
                arch:
                    -   id: aarch64
                        name: ARM64

                    -   id: x86_64
                        name: X64

        runs-on: [ubuntu-24.04, ${{ matrix.arch.name }}]
        name: "${{ matrix.os.display }} (${{ matrix.arch.id }})"
        steps:
            -   name: 🎀 Setup AWS CLI 🎀
                uses: aws-actions/configure-aws-credentials@v1
                with:
                    aws-secret-access-key: ${{ secrets.AWS_S3_ACCESS_SECRET }}
                    aws-access-key-id: ${{ vars.AWS_S3_ACCESS_KEY }}
                    aws-region: us-east-1

            -   name: 🎀 Checkout repository 🎀
                uses: actions/checkout@v3

            -   name: 🎀 Build Dollup 🎀
                run: Scripts/Build/Linux
                env:
                    DEPLOY_VERSION: ${{ github.head_ref || github.ref_name }}

            -   name: 🎀 Upload products 🎀
                env:
                    DEPLOY_PLATFORM: "${{ matrix.os.version }}-${{ matrix.arch.name }}"
                    DEPLOY_VERSION: ${{ github.head_ref || github.ref_name }}

                run: Scripts/Deploy *.artifactbundle.zip
