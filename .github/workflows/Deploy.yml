name: package

on:
    workflow_dispatch:
    #   We build semver tags, and the master branch.
    push:
        branches: [ master ]
        tags:
            -   '[0-9]+.[0-9]+.[0-9]+'

jobs:
    macos:
        runs-on: macos-26
        name: macOS
        steps:
            -   name: 🎀 Setup AWS CLI 🎀
                uses: aws-actions/configure-aws-credentials@v1
                with:
                    aws-secret-access-key: ${{ secrets.AWS_S3_ACCESS_SECRET }}
                    aws-access-key-id: ${{ vars.AWS_S3_ACCESS_KEY }}
                    aws-region: us-east-1

            -   name: 🎀 Checkout repository 🎀
                uses: actions/checkout@v3

            -   name: 🎀 Select Xcode 26.3 🎀
                run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

            -   name: 🎀 Build Dollup 🎀
                run: Scripts/Build/macOS
                env:
                    DEPLOY_VERSION: ${{ github.head_ref || github.ref_name }}

            -   name: 🎀 Upload products 🎀
                run: Scripts/Deploy *.artifactbundle.zip
                env:
                    DEPLOY_PLATFORM: "macOS-${{ runner.arch }}"
                    DEPLOY_VERSION: ${{ github.head_ref || github.ref_name }}

    linux:
        strategy:
            matrix:
                runner:
                    -   name: "Ubuntu (x86_64)"
                        id: ubuntu-24.04

                    -   name: "Ubuntu (aarch64)"
                        id: ubuntu-24.04-arm

        runs-on: ["${{ matrix.runner.id }}"]
        name: "${{ matrix.runner.name }}"
        steps:
            -   name: 🎀 Setup AWS CLI 🎀
                uses: aws-actions/configure-aws-credentials@v1
                with:
                    aws-secret-access-key: ${{ secrets.AWS_S3_ACCESS_SECRET }}
                    aws-access-key-id: ${{ vars.AWS_S3_ACCESS_KEY }}
                    aws-region: us-east-1

            -   name: 🎀 Checkout repository 🎀
                uses: actions/checkout@v3

            -   name: 🎀 Build Dollup 🎀
                run: Scripts/Build/Linux
                env:
                    DEPLOY_VERSION: ${{ github.head_ref || github.ref_name }}

            -   name: 🎀 Upload products 🎀
                env:
                    DEPLOY_PLATFORM: "linux-${{ runner.arch }}"
                    DEPLOY_VERSION: ${{ github.head_ref || github.ref_name }}

                run: Scripts/Deploy *.artifactbundle.zip
