name: Tests

permissions:
    contents: write
on:
    push:
        branches: [ master ]
    pull_request:
        branches: [ master ]

jobs:
    changes:
        runs-on: ubuntu-latest
        name: Assess changes
        steps:
            -   name: 🎀 Checkout repository 🎀
                uses: actions/checkout@v6

            -   name: 🎀 Decide checks 🎀
                uses: tj-actions/changed-files@v47
                id: changes
                with:
                    files_ignore: |
                        README.md
                        LICENSE
                        NOTICE
                        .mailmap
                        .gitignore
                        .github/FUNDING.yml
        outputs:
            code_changed: ${{ steps.changes.outputs.any_changed }}

    Linux:
        runs-on: ubuntu-24.04-arm
        name: Ubuntu 24.04
        needs: changes
        if: needs.changes.outputs.code_changed == 'true'
        steps:
            -   name: 🎀 Checkout repository 🎀
                uses: actions/checkout@v6

            -   name: 🎀 Install Swift 🎀
                uses: rarestype/swift-install-action@v1
                with:
                    swift-release: 6.3.1-RELEASE

            -   name: 🎀 Run tests 🎀
                run: Scripts/TestAll

            -   name: 🎀 Package 🎀
                run: Scripts/Package
                env:
                    DEPLOY_VERSION: _unstable

            -   name: 🎀 Update badge 🎀
                uses: rarestype/rarestbadge@v1
                if: always()

    macOS:
        runs-on: macos-26
        needs: changes
        if: needs.changes.outputs.code_changed == 'true'
        steps:
            -   name: 🎀 Checkout repository 🎀
                uses: actions/checkout@v6

            -   name: 🎀 Install Swift 🎀
                uses: rarestype/swift-install-action@v1
                with:
                    swift-release: 6.3.1-RELEASE

            -   name: 🎀 Run tests 🎀
                run: Scripts/TestAll

            -   name: 🎀 Package 🎀
                run: Scripts/Package
                env:
                    DEPLOY_VERSION: _unstable

            -   name: 🎀 Update badge 🎀
                uses: rarestype/rarestbadge@v1
                if: always()
