name: Tests

on:
    push:
        branches: [ master ]
    pull_request:
        branches: [ master ]

jobs:
    Linux:
        runs-on: ubuntu-24.04
        name: Ubuntu 24.04
        steps:
            -   name: 🎀 Install Swift 🎀
                uses: rarestype/swift-install-action@master
                with:
                    swift-prefix: "swift-6.2.4-release/ubuntu2404/swift-6.2.4-RELEASE"
                    swift-id: "swift-6.2.4-RELEASE-ubuntu24.04"

            -   name: 🎀 Checkout repository 🎀
                uses: actions/checkout@v6

            -   name: 🎀 Run tests 🎀
                run: Scripts/TestAll

            -   name: 🎀 Update badge 🎀
                uses: rarestype/rarestbadge@v1
                if: always()

    macOS:
        runs-on: macos-26
        steps:
            -   name: 🎀 Install Swift 🎀
                uses: rarestype/swift-install-action@master
                with:
                    swift-prefix: "swift-6.2.4-release/xcode/swift-6.2.4-RELEASE"
                    swift-id: "swift-6.2.4-RELEASE"

            -   name: 🎀 Select Swift version 🎀
                run: |
                    echo TOOLCHAINS=$(plutil -extract CFBundleIdentifier raw /Library/Developer/Toolchains/swift-6.2.4-RELEASE.xctoolchain/Info.plist) >> $GITHUB_ENV

            -   name: 🎀 Checkout repository 🎀
                uses: actions/checkout@v6

            -   name: 🎀 Run tests 🎀
                run: Scripts/TestAll

            -   name: 🎀 Update badge 🎀
                uses: rarestype/rarestbadge@v1
                if: always()
